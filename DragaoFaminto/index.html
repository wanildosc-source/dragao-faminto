<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐲 Dragão Faminto</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Nuvens -->

    <div class="nuvem nuvem1">☁️</div>
    <div class="nuvem nuvem2">☁️</div>
    <div class="nuvem nuvem3">☁️</div>

    <!-- Arco-íris -->

    <div id="arcoiris">🌈</div>

    <div id="container">

        <h1>🐲 Dragão Faminto</h1>

        <div id="faseAtual">
            🥉 FASE 1 - BRONZE
        </div>

        <div id="progressoTexto">
            Questão 1 de 5
        </div>

        <div id="barraProgresso">
            <div id="barra"></div>
        </div>

        <div id="estrelas">
            ☆ ☆ ☆ ☆ ☆
        </div>

        <div id="numero"></div>

        <div id="contadorMacas">
            Maçãs dadas: 0
        </div>

        <div id="mensagem"></div>

        <div id="macas"></div>

        <div id="areaDragao">

            <img id="dragao"
                src="img/dragao.png"
                alt="Dragão">

            <div id="alvoDragao">
                SOLTE AS MAÇÃS AQUI
            </div>

        </div>

        <!-- Tela Final da Fase -->

        <div id="telaVitoria"
            style="display:none;">

            <h2>🏆 FASE CONCLUÍDA! 🏆</h2>

            <p id="textoMedalha">
                Você ganhou uma medalha!
            </p>

            <div id="estrelasFinais">
                ⭐⭐⭐⭐⭐
            </div>

            <button id="btnProximaFase">
                Próxima Fase ➡️
            </button>

        </div>

    </div>

    <!-- Áudios -->

    <audio id="somAcerto"
        src="audio/acerto.mp3"></audio>

    <audio id="somErro"
        src="audio/erro.mp3"></audio>

    <audio id="somNhac"
        src="audio/nhac.mp3"></audio>

    <audio id="musicaFundo"
        src="audio/fundo.mp3"
        loop></audio>

    <script src="script.js"></script>

</body>

</html>
